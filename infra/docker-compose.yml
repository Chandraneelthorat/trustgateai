services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: trustgateai
      POSTGRES_PASSWORD: trustgateai
      POSTGRES_DB: trustgateai
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U trustgateai -d trustgateai"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  api:
    build:
      context: ../apps/backend
      dockerfile: Dockerfile
    env_file:
      - ../.env.example
    environment:
      DATABASE_URL: postgresql+psycopg://trustgateai:trustgateai@postgres:5432/trustgateai
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/0
      SKIP_CELERY_SYNC: "0"
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: >
      sh -c "alembic upgrade head 2>/dev/null || true && uvicorn app.main:app --host 0.0.0.0 --port 8000"

  worker:
    build:
      context: ../apps/backend
      dockerfile: Dockerfile
    env_file:
      - ../.env.example
    environment:
      DATABASE_URL: postgresql+psycopg://trustgateai:trustgateai@postgres:5432/trustgateai
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/0
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: celery -A app.worker:celery_app worker --loglevel=INFO

  web:
    build:
      context: ../apps/frontend
      dockerfile: Dockerfile
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
    ports:
      - "3000:3000"
    depends_on:
      - api

volumes:
  pgdata:
